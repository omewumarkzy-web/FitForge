<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FitForge — Weight Loss & Body Goals</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1D9E75; --brand-light: #E1F5EE; --brand-mid: #9FE1CB;
    --brand-dark: #085041; --brand-deep: #0F6E56;
    --accent: #EF9F27; --accent-light: #FAEEDA; --accent-dark: #412402;
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --text: #1a1a18; --muted: #6b6b68;
    --ff-head: 'Syne', sans-serif; --ff-body: 'DM Sans', sans-serif;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #f0f0ec; --muted: #a0a09c;
    }
  }
  html, body { height: 100%; }
  body { font-family: var(--ff-body); color: var(--text); background: var(--bg3); font-size: 14px; line-height: 1.5; min-height: 100vh; }
  .shell { max-width: 420px; margin: 0 auto; min-height: 100vh; background: var(--bg3); display: flex; flex-direction: column; }

  /* AUTH */
  .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; gap: 20px; }
  .auth-logo { font-family: var(--ff-head); font-size: 36px; font-weight: 800; letter-spacing: -1px; }
  .auth-logo em { color: var(--brand); font-style: normal; }
  .auth-tagline { font-size: 14px; color: var(--muted); text-align: center; margin-top: -12px; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .auth-title { font-family: var(--ff-head); font-size: 18px; font-weight: 700; }
  .auth-input { width: 100%; padding: 11px 14px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: var(--ff-body); outline: none; }
  .auth-input:focus { border-color: var(--brand); }
  .auth-btn { width: 100%; padding: 12px; background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--ff-head); font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .auth-btn:hover { opacity: 0.88; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-switch { font-size: 13px; color: var(--muted); text-align: center; cursor: pointer; }
  .auth-switch span { color: var(--brand); font-weight: 500; }
  .auth-err { font-size: 12px; color: #E24B4A; background: #FCEBEB; padding: 9px 12px; border-radius: 6px; display: none; }
  .auth-err.show { display: block; }

  /* NAV */
  .nav { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 12px 14px 10px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; gap: 8px; }
  .logo { font-family: var(--ff-head); font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; flex-shrink: 0; }
  .logo em { color: var(--brand); font-style: normal; }
  .signout-btn { font-size: 11px; color: var(--muted); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 9px; cursor: pointer; font-family: var(--ff-body); flex-shrink: 0; }
  .tabs { display: flex; gap: 2px; background: var(--bg2); border-radius: 10px; padding: 3px; }
  .tab { font-family: var(--ff-body); font-size: 12px; font-weight: 500; padding: 4px 11px; border-radius: 7px; border: none; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.15s; }
  .tab.on { background: var(--bg); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .pro-pill { display: inline-block; font-size: 9px; font-weight: 700; background: var(--accent); color: var(--accent-dark); padding: 1px 5px; border-radius: 10px; margin-left: 2px; vertical-align: middle; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; gap: 12px; padding: 14px 14px 80px; }
  .screen.on { display: flex; }

  /* CARDS */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .card-title { font-family: var(--ff-head); font-size: 13px; font-weight: 700; margin-bottom: 10px; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
  .metric { background: var(--bg2); border-radius: var(--radius-sm); padding: 11px 12px; }
  .metric-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .metric-val { font-family: var(--ff-head); font-size: 22px; font-weight: 700; line-height: 1; }
  .metric-sub { font-size: 11px; margin-top: 3px; }
  .green { color: var(--brand); } .muted-c { color: var(--muted); }

  /* RING */
  .ring-row { display: flex; align-items: center; gap: 14px; }
  .ring-text .rt { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .ring-text .rs { font-size: 12px; color: var(--muted); line-height: 1.55; }

  /* FEED */
  .feed { display: flex; flex-direction: column; }
  .feed-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .feed-row:last-of-type { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .feed-name { flex: 1; font-size: 13px; }
  .feed-kcal { font-size: 12px; color: var(--muted); }
  .empty-state { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }
  .add-row { display: flex; gap: 7px; margin-top: 10px; }
  .add-row input { flex: 1; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: var(--ff-body); outline: none; }
  .add-row input:focus { border-color: var(--brand); }
  .add-row input.narrow { max-width: 70px; flex: none; }
  .add-btn { padding: 8px 14px; background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--ff-body); }

  /* CTA */
  .cta { background: var(--brand-light); border: 0.5px solid var(--brand-mid); border-radius: var(--radius); padding: 14px 16px; display: flex; gap: 12px; align-items: center; }
  .cta-icon { width: 36px; height: 36px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .cta-body { flex: 1; }
  .cta-title { font-size: 13px; font-weight: 500; color: var(--brand-dark); }
  .cta-sub { font-size: 11px; color: var(--brand-deep); margin-top: 2px; }
  .cta-btn { padding: 8px 12px; background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: var(--ff-body); }

  /* TRACKER */
  .big-row { display: flex; gap: 8px; }
  .big-input { flex: 1; padding: 10px 14px; font-size: 15px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: var(--ff-body); outline: none; }
  .big-input:focus { border-color: var(--brand); }
  .big-btn { padding: 10px 18px; background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--ff-body); }
  .big-btn:disabled { opacity: 0.5; }
  .bars-wrap { display: flex; align-items: flex-end; gap: 5px; height: 80px; }
  .bwrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--brand-mid); transition: height 0.35s; }
  .bar.now { background: var(--brand); }
  .bday { font-size: 10px; color: var(--muted); }

  /* LOCK */
  .lock-card { border: 0.5px dashed var(--border2); border-radius: var(--radius); padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; background: var(--bg); }
  .lock-icon { width: 34px; height: 34px; background: var(--bg2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .lock-title { font-size: 13px; font-weight: 500; }
  .lock-sub { font-size: 12px; color: var(--muted); }
  .lock-btn { margin-top: 4px; padding: 8px 22px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--ff-body); }

  /* PLANS */
  .plans-header { text-align: center; padding: 4px 0; }
  .plans-title { font-family: var(--ff-head); font-size: 20px; font-weight: 800; }
  .plans-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .plan-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
  .plan { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .plan.star { border: 2px solid var(--brand); position: relative; padding-top: 20px; }
  .plan-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--brand); color: #fff; font-size: 10px; font-weight: 700; font-family: var(--ff-head); padding: 2px 12px; border-radius: 20px; white-space: nowrap; }
  .plan-name { font-family: var(--ff-head); font-size: 14px; font-weight: 800; }
  .plan-price { font-family: var(--ff-head); font-size: 24px; font-weight: 800; }
  .plan-price span { font-size: 12px; font-weight: 400; color: var(--muted); font-family: var(--ff-body); }
  .plan-feats { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .feat { display: flex; gap: 6px; font-size: 11px; color: var(--muted); }
  .feat.on { color: var(--text); }
  .feat-ic { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .plan-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--ff-body); }
  .plan-btn.free-b { background: var(--bg2); color: var(--text); }
  .plan-btn.pro-b { background: var(--brand); color: #fff; }
  .trust { text-align: center; font-size: 11px; background: var(--brand-light); color: var(--brand-dark); padding: 9px; border-radius: 8px; }
  .testimonials { display: flex; flex-direction: column; gap: 10px; }
  .testi { font-size: 12px; color: var(--muted); line-height: 1.6; border-left: 2px solid var(--brand); padding-left: 10px; border-radius: 0; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 14px; animation: slideup 0.25s ease; }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto -6px; }
  .modal-title { font-family: var(--ff-head); font-size: 20px; font-weight: 800; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-top: -6px; }
  .perks { display: flex; flex-direction: column; gap: 10px; }
  .perk { display: flex; gap: 10px; font-size: 13px; align-items: flex-start; }
  .perk-ic { width: 28px; height: 28px; background: var(--brand-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; color: var(--brand-dark); }
  .perk-text strong { font-weight: 500; display: block; font-size: 13px; }
  .perk-text small { font-size: 11px; color: var(--muted); }
  .price-note { font-size: 12px; color: var(--muted); background: var(--bg2); padding: 10px 14px; border-radius: 8px; text-align: center; }
  .price-note strong { color: var(--text); font-weight: 500; }
  .modal-cta { padding: 14px; background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--ff-head); font-size: 15px; font-weight: 700; cursor: pointer; }
  .modal-skip { text-align: center; font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px; }

  /* LOADING */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 30px; z-index: 99; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="shell" id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading FitForge...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vvtnpwkcsiogigctolxf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2dG5wd2tjc2lvZ2lnY3RvbHhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTI0MTYsImV4cCI6MjA5MDkyODQxNn0.XG-HeI_s1SNaXrcnGGlhS1gKlMz_spnwMkcDyuFzRX8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let weights = [];
let meals = [];
const BUDGET = 1800;
const GOAL = 165;
const DOT_COLORS = ['#1D9E75','#EF9F27','#378ADD','#D4537E','#639922','#D85A30'];
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; await loadApp(); }
  else showAuth('login');

  sb.auth.onAuthStateChange(async (_e, session) => {
    if (session) { currentUser = session.user; await loadApp(); }
    else { currentUser = null; showAuth('login'); }
  });
}

/* AUTH */
function showAuth(mode) {
  document.getElementById('app').innerHTML = `
    <div class="auth-screen">
      <div class="auth-logo">Fit<em>Forge</em></div>
      <div class="auth-tagline">Track your weight loss journey</div>
      <div class="auth-card">
        <div class="auth-title">${mode === 'login' ? 'Sign in' : 'Create your account'}</div>
        <div class="auth-err" id="auth-err"></div>
        <input class="auth-input" id="auth-email" type="email" placeholder="Email address" />
        <input class="auth-input" id="auth-pass" type="password" placeholder="Password (min 6 characters)" />
        <button class="auth-btn" id="auth-btn" onclick="handleAuth('${mode}')">
          ${mode === 'login' ? 'Sign in' : 'Create account'}
        </button>
        <div class="auth-switch" onclick="showAuth('${mode === 'login' ? 'signup' : 'login'}')">
          ${mode === 'login' ? "No account? <span>Sign up free</span>" : "Have an account? <span>Sign in</span>"}
        </div>
      </div>
    </div>`;
}

async function handleAuth(mode) {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const btn   = document.getElementById('auth-btn');
  const err   = document.getElementById('auth-err');
  err.classList.remove('show');
  if (!email || !pass) { err.textContent = 'Please enter your email and password.'; err.classList.add('show'); return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Please wait...';
  const fn = mode === 'login' ? sb.auth.signInWithPassword : sb.auth.signUp;
  const { error, data } = await (mode === 'login'
    ? sb.auth.signInWithPassword({ email, password: pass })
    : sb.auth.signUp({ email, password: pass }));
  if (error) { err.textContent = error.message; err.classList.add('show'); btn.disabled = false; btn.textContent = mode === 'login' ? 'Sign in' : 'Create account'; }
  else if (mode === 'signup' && !data.session) { err.textContent = 'Check your email to confirm your account, then sign in.'; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Sign in'; }
}

/* LOAD */
async function loadApp() {
  document.getElementById('app').innerHTML = `<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading your data...</div></div>`;
  await fetchData();
  renderApp();
}

async function fetchData() {
  const today = new Date().toISOString().split('T')[0];
  const { data: w } = await sb.from('weights').select('*').eq('user_id', currentUser.id).order('logged_at', { ascending: false }).limit(14);
  weights = (w || []).reverse();
  const { data: m } = await sb.from('meals').select('*').eq('user_id', currentUser.id).gte('logged_at', today + 'T00:00:00').order('logged_at', { ascending: true });
  meals = m || [];
}

/* RENDER */
function renderApp() {
  const name = currentUser.email.split('@')[0];
  const consumed = meals.reduce((s, m) => s + m.calories, 0);
  const remaining = Math.max(BUDGET - consumed, 0);
  const ringPct = Math.min(consumed / BUDGET, 1);
  const ringOff = (157.08 * (1 - ringPct)).toFixed(2);
  const latestW = weights.length ? Math.round(weights[weights.length-1].weight) : '--';

  document.getElementById('app').innerHTML = `
    <nav class="nav">
      <div class="logo">Fit<em>Forge</em></div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="signout-btn" onclick="signOut()">Sign out</button>
        <div class="tabs">
          <button class="tab on" onclick="go('dash',this)">Today</button>
          <button class="tab" onclick="go('track',this)">Track</button>
          <button class="tab" onclick="go('plans',this)">Pro<span class="pro-pill">PRO</span></button>
        </div>
      </div>
    </nav>

    <div id="dash" class="screen on">
      <div class="card" style="padding:10px 14px;font-size:13px;">Welcome back, <strong>${name}</strong> 👋</div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">Weight</div><div class="metric-val">${latestW}</div><div class="metric-sub muted-c">Goal: ${GOAL}</div></div>
        <div class="metric"><div class="metric-label">Kcal left</div><div class="metric-val" id="m-rem">${remaining}</div><div class="metric-sub muted-c">of ${BUDGET}</div></div>
        <div class="metric"><div class="metric-label">Meals</div><div class="metric-val" id="m-meals">${meals.length}</div><div class="metric-sub green">today</div></div>
      </div>
      <div class="card">
        <div class="ring-row">
          <svg width="64" height="64" viewBox="0 0 64 64" style="flex-shrink:0">
            <circle cx="32" cy="32" r="25" fill="none" stroke="var(--bg2)" stroke-width="8"/>
            <circle id="ring-arc" cx="32" cy="32" r="25" fill="none" stroke="var(--brand)" stroke-width="8"
              stroke-dasharray="157.08" stroke-dashoffset="${ringOff}" stroke-linecap="round" transform="rotate(-90 32 32)"/>
            <text x="32" y="37" text-anchor="middle" font-family="Syne,sans-serif" font-weight="700" font-size="12" fill="var(--text)" id="ring-pct">${Math.round(ringPct*100)}%</text>
          </svg>
          <div class="ring-text">
            <div class="rt">Calorie budget</div>
            <div class="rs" id="kcal-text">${consumed.toLocaleString()} of ${BUDGET.toLocaleString()} kcal. ${remaining.toLocaleString()} remaining.</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Meals today</div>
        <div class="feed" id="feed">${renderFeed()}</div>
        <div class="add-row">
          <input id="mn" placeholder="Food name..." />
          <input id="mk" class="narrow" type="number" placeholder="kcal" min="1" />
          <button class="add-btn" onclick="addMeal()">Add</button>
        </div>
      </div>
      <div class="cta">
        <div class="cta-icon">★</div>
        <div class="cta-body"><div class="cta-title">Your AI coach has a tip</div><div class="cta-sub">Personalized plan unlocks with Pro</div></div>
        <button class="cta-btn" onclick="openModal()">Try Pro</button>
      </div>
    </div>

    <div id="track" class="screen">
      <div class="big-row">
        <input class="big-input" id="wi" type="number" placeholder="Today's weight (lbs)" min="80" max="500" step="0.1" />
        <button class="big-btn" id="log-btn" onclick="logWeight()">Log</button>
      </div>
      <div class="card">
        <div class="card-title">Weight history</div>
        <div class="bars-wrap" id="bars"></div>
      </div>
      <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">Body composition analytics</div>
        <div class="lock-sub">BMI, body fat %, muscle mass — Pro only</div>
        <button class="lock-btn" onclick="openModal()">Unlock with Pro</button>
      </div>
    </div>

    <div id="plans" class="screen">

function renderFeed() {
  if (!meals.length) return '<div class="empty-state">No meals logged yet today</div>';
  return meals.map((m,i) => `
    <div class="feed-row">
      <div class="dot" style="background:${DOT_COLORS[i%DOT_COLORS.length]}"></div>
      <div class="feed-name">${m.name}</div>
      <div class="feed-kcal">${m.calories} kcal</div>
    </div>`).join('');
}

function go(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  if (id === 'track') renderBars();
}

function renderBars() {
  const el = document.getElementById('bars');
  if (!el) return;
  if (!weights.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;width:100%;padding:16px 0">No weight entries yet — log your first weight above</div>'; return; }
  el.innerHTML = '';
  const vals = weights.map(w => w.weight);
  const mn = Math.min(...vals) - 4, mx = Math.max(...vals) + 3, range = mx - mn;
  weights.forEach((w, i) => {
    const h = Math.max(Math.round(((w.weight - mn) / range) * 68), 6);
    const d = new Date(w.logged_at);
    const wrap = document.createElement('div'); wrap.className = 'bwrap';
    const bar = document.createElement('div'); bar.className = 'bar' + (i === weights.length-1 ? ' now' : ''); bar.style.height = h+'px';
    const lbl = document.createElement('div'); lbl.className = 'bday'; lbl.textContent = DAY_LABELS[d.getDay()][0];
    wrap.appendChild(bar); wrap.appendChild(lbl); el.appendChild(wrap);
  });
}

async function logWeight() {
  const v = parseFloat(document.getElementById('wi').value);
  if (!v || v < 80 || v > 500) { showToast('Enter a valid weight'); return; }
  const btn = document.getElementById('log-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const { error } = await sb.from('weights').insert({ user_id: currentUser.id, weight: v, logged_at: new Date().toISOString() });
  if (error) { showToast('Error: ' + error.message); console.error(error); }
  else { document.getElementById('wi').value = ''; await fetchData(); renderBars(); showToast('Weight logged ✓'); }
  btn.disabled = false; btn.textContent = 'Log';
}

async function addMeal() {
  const name = document.getElementById('mn').value.trim();
  const kcal = parseInt(document.getElementById('mk').value);
  if (!name || !kcal || kcal < 1) { showToast('Enter food name and calories'); return; }
  const { error } = await sb.from('meals').insert({ user_id: currentUser.id, name, calories: kcal, logged_at: new Date().toISOString() });
  if (error) { showToast('Error: ' + error.message); console.error(error); return; }
  document.getElementById('mn').value = ''; document.getElementById('mk').value = '';
  await fetchData();
  document.getElementById('feed').innerHTML = renderFeed();
  const consumed = meals.reduce((s,m) => s+m.calories, 0);
  const remaining = Math.max(BUDGET - consumed, 0);
  const pct = Math.min(consumed/BUDGET, 1);
  const arc = document.getElementById('ring-arc');
  const pctTxt = document.getElementById('ring-pct');
  const kt = document.getElementById('kcal-text');
  const mr = document.getElementById('m-rem');
  const mm = document.getElementById('m-meals');
  if (arc) arc.setAttribute('stroke-dashoffset', (157.08*(1-pct)).toFixed(2));
  if (pctTxt) pctTxt.textContent = Math.round(pct*100)+'%';
  if (kt) kt.textContent = consumed.toLocaleString()+' of '+BUDGET.toLocaleString()+' kcal. '+remaining.toLocaleString()+' remaining.';
  if (mr) mr.textContent = remaining;
  if (mm) mm.textContent = meals.length;
  showToast('Meal added ✓');
}

async function signOut() { await sb.auth.signOut(); showToast('Signed out'); }

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleUpgrade() {
  closeModal();
  /* REPLACE THE URL BELOW WITH YOUR PAYSTACK OR STRIPE PAYMENT LINK */
  window.open('https://paystack.com/pay/REPLACE_WITH_YOUR_LINK', '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
